services:
  postgres:
    image: postgres:16
    container_name: pg_disque_denuncia
    restart: always
    ports:
      - "5678:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  postgres-bootstrap:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: postgres
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        psql -h postgres -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'disque_denuncia_legado'" | grep -q 1 || psql -h postgres -U postgres -d postgres -c "CREATE DATABASE disque_denuncia_legado"
        psql -h postgres -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'disque_denuncia_novo'" | grep -q 1 || psql -h postgres -U postgres -d postgres -c "CREATE DATABASE disque_denuncia_novo"

  redis:
    image: redis:alpine
    container_name: redis_sistema
    restart: always
    ports:
      - "6379:6379"

  app:
    build:
      context: ./docker/app
    container_name: php_apache_sistema
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
